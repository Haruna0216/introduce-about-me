<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>久保の自己紹介</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#667eea,#764ba2);
  font-family:'Poppins', sans-serif;
}

.card{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  padding:60px 40px;
  border-radius:30px;
  text-align:center;
  width:350px;
  color:white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

h1{
  font-size:3em;
  margin:0;
  letter-spacing:3px;
  font-weight:600;
}

.line{
  width:60px;
  height:3px;
  background:white;
  margin:20px auto 0;
  border-radius:2px;
  opacity:0.8;
}
</style>
</head>
<body>

<div class="card">
  <h1>久保</h1>
  <div class="line"></div>
</div>

</body>
</html>
