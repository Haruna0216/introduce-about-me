久保
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>久保の自己紹介</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      width: 350px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      font-size: 1.1em;
      line-height: 1.6;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #764ba2;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #eee;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>久保</h1>
    <p>
      はじめまして！<br>
      久保の自己紹介ページです。<br>
      これからいろいろなことに挑戦していきます ✨
    </p>
    <button class="btn" onclick="alert('見てくれてありがとう！')">
      Click Me
    </button>
  </div>

</body>
</html>
